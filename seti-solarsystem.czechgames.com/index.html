<html lang="en">
<head>
  <script>
    // Check if user has already given consent
    const consent = localStorage.getItem("cookieConsent");

    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    // Default: Block tracking until consent is given
    gtag('consent', 'default', {
      'ad_storage': 'denied',
      'analytics_storage': 'denied'
    });

    // If consent was already given, enable tracking
    if (consent === "granted") {
      loadAnalytics();
    }

    function loadAnalytics() {
      let script = document.createElement("script");
      script.async = true;
      script.src = "https://www.googletagmanager.com/gtag/js?id=G-492EZWW104";
      document.head.appendChild(script);

      script.onload = () => {
        gtag('js', new Date());
        gtag('config', 'G-492EZWW104', { anonymize_ip: true });
        gtag('consent', 'update', {
          'ad_storage': 'granted',
          'analytics_storage': 'granted'
        });
      };
    }

    function acceptCookies() {
      localStorage.setItem("cookieConsent", "granted");
      loadAnalytics();
      document.getElementById("cookie-banner").style.display = "none";
    }

    function rejectCookies() {
      localStorage.setItem("cookieConsent", "denied");
      document.getElementById("cookie-banner").style.display = "none";
    }
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SETI Randomizer</title>
  <script type="module" src="main.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>

  </style>
</head>

<body>
  <div id="cookie-banner" style="display: none;">
    We use cookies for analytics.
    <button class="accept" onclick="acceptCookies()">Accept</button>
    <button class="reject" onclick="rejectCookies()">Reject</button>
  </div>

  <div class="app-wrap">
    <div class="title-block"></div>
    <div class="wheel-wrap"></div>
    <div class="button-wrap">
      <div class="connector"></div>
      <button class="spin-button pulsin"></button>
    </div>
  </div>

  <script>
    // Show banner only if consent hasn't been given yet
    if (!localStorage.getItem("cookieConsent")) {
      document.getElementById("cookie-banner").style.display = "block";
    }
  </script>
</body>
</html>
